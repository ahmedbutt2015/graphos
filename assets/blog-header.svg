<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 190" width="1200" height="190" style="display:block;max-width:100%;height:auto;">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <filter id="glow-sm" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.5" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>

    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28,0 L0,0 0,28" fill="none" stroke="rgba(124,255,176,0.05)" stroke-width="0.5"></path>
    </pattern>

    <!-- Right-side fade so graph nodes bleed into dark -->
    <linearGradient id="rfade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="60%" stop-color="transparent"></stop>
      <stop offset="100%" stop-color="#06080a"></stop>
    </linearGradient>
    <linearGradient id="lfade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06080a"></stop>
      <stop offset="18%" stop-color="transparent"></stop>
    </linearGradient>

    <!-- Ambient glow blob -->
    <radialGradient id="blob" cx="75%" cy="50%" r="40%">
      <stop offset="0%" stop-color="rgba(124,255,176,0.12)"></stop>
      <stop offset="100%" stop-color="transparent"></stop>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="190" fill="#06080a"></rect>
  <rect width="1200" height="190" fill="url(#grid)"></rect>
  <!-- Ambient mint glow right -->
  <rect width="1200" height="190" fill="url(#blob)"></rect>

  <!-- ── TOP BORDER LINE ── -->
  <line x1="0" y1="1" x2="1200" y2="1" stroke="rgba(124,255,176,0.22)" stroke-width="1"></line>
  <!-- Corner ticks -->
  <line x1="1" y1="1" x2="1" y2="12" stroke="rgba(124,255,176,0.5)" stroke-width="1.5"></line>
  <line x1="1199" y1="1" x2="1199" y2="12" stroke="rgba(124,255,176,0.5)" stroke-width="1.5"></line>

  <!-- ── BOTTOM BORDER LINE ── -->
  <line x1="0" y1="189" x2="1200" y2="189" stroke="rgba(124,255,176,0.22)" stroke-width="1"></line>
  <line x1="1" y1="178" x2="1" y2="189" stroke="rgba(124,255,176,0.5)" stroke-width="1.5"></line>
  <line x1="1199" y1="178" x2="1199" y2="189" stroke="rgba(124,255,176,0.5)" stroke-width="1.5"></line>

  <!-- ── DECORATIVE BACKGROUND GRAPH (right side) ── -->
  <line x1="820" y1="30" x2="960" y2="15" stroke="rgba(124,255,176,0.10)" stroke-width="1"></line>
  <line x1="960" y1="15" x2="1080" y2="70" stroke="rgba(124,255,176,0.08)" stroke-width="1"></line>
  <line x1="1080" y1="70" x2="1060" y2="165" stroke="rgba(124,255,176,0.09)" stroke-width="1"></line>
  <line x1="1060" y1="165" x2="900" y2="175" stroke="rgba(124,255,176,0.07)" stroke-width="1"></line>
  <line x1="900" y1="175" x2="820" y2="30" stroke="rgba(124,255,176,0.08)" stroke-width="1"></line>
  <line x1="960" y1="15" x2="1060" y2="165" stroke="rgba(124,255,176,0.05)" stroke-width="1"></line>
  <line x1="820" y1="30" x2="1080" y2="70" stroke="rgba(124,255,176,0.04)" stroke-width="1"></line>
  <line x1="1080" y1="70" x2="1150" y2="30" stroke="rgba(124,255,176,0.06)" stroke-width="1"></line>
  <line x1="960" y1="15" x2="1010" y2="-5" stroke="rgba(124,255,176,0.06)" stroke-width="1"></line>

  <circle cx="820" cy="30" r="3.5" fill="none" stroke="rgba(124,255,176,0.25)" stroke-width="1"></circle>
  <circle cx="960" cy="15" r="3.5" fill="none" stroke="rgba(124,255,176,0.25)" stroke-width="1"></circle>
  <circle cx="1080" cy="70" r="3.5" fill="none" stroke="rgba(124,255,176,0.22)" stroke-width="1"></circle>
  <circle cx="1060" cy="165" r="3.5" fill="none" stroke="rgba(124,255,176,0.18)" stroke-width="1"></circle>
  <circle cx="900" cy="175" r="3.5" fill="none" stroke="rgba(124,255,176,0.15)" stroke-width="1"></circle>
  <circle cx="1150" cy="30" r="2.5" fill="none" stroke="rgba(124,255,176,0.12)" stroke-width="1"></circle>

  <!-- Fade overlays -->
  <rect width="1200" height="190" fill="url(#rfade)"></rect>
  <rect width="1200" height="190" fill="url(#lfade)"></rect>

  <!-- ── LOGO MARK (top=60,14  BL=26,75  BR=94,75) centred at x~60 y~50 ── -->
  <!-- glow halo -->
  <circle cx="60" cy="14" r="14" fill="#7cffb0" opacity="0.12" filter="url(#glow)"></circle>

  <!-- Edges -->
  <!-- BL → top gated (mint) -->
  <line x1="30" y1="71" x2="42" y2="46" stroke="#7cffb0" stroke-width="2.5" stroke-linecap="round"></line>
  <rect x="36" y="38" width="11" height="11" rx="1.5" transform="rotate(45 41.5 43.5)" fill="#06080a" stroke="#7cffb0" stroke-width="2.5" stroke-linejoin="miter" filter="url(#glow-sm)"></rect>
  <line x1="49" y1="36" x2="56" y2="20" stroke="#7cffb0" stroke-width="2.5" stroke-linecap="round"></line>
  <polygon points="57,18 51,27 63,27" fill="#7cffb0" filter="url(#glow-sm)"></polygon>

  <!-- top → BR -->
  <line x1="64" y1="18" x2="88" y2="68" stroke="rgba(255,255,255,0.5)" stroke-width="2.2" stroke-linecap="round"></line>
  <polygon points="88,68 80,63 84,72" fill="rgba(255,255,255,0.5)"></polygon>
  <!-- BR → BL -->
  <line x1="85" y1="76" x2="35" y2="76" stroke="rgba(255,255,255,0.5)" stroke-width="2.2" stroke-linecap="round"></line>
  <polygon points="35,76 43,71 43,81" fill="rgba(255,255,255,0.5)"></polygon>

  <!-- Nodes -->
  <circle cx="60" cy="14" r="10" fill="#7cffb0" filter="url(#glow-sm)"></circle>
  <circle cx="60" cy="14" r="6" fill="#06080a"></circle>
  <circle cx="26" cy="76" r="8" fill="#06080a" stroke="rgba(255,255,255,0.55)" stroke-width="2.2"></circle>
  <circle cx="94" cy="76" r="8" fill="#06080a" stroke="rgba(255,255,255,0.55)" stroke-width="2.2"></circle>

  <!-- ── WORDMARK ── -->
  <text x="118" y="58" font-family="'Geist', 'Inter', system-ui, sans-serif" font-size="46" font-weight="300" letter-spacing="-1.5" fill="#ffffff">Graph</text>
  <text x="241" y="58" font-family="'Geist', 'Inter', system-ui, sans-serif" font-size="46" font-weight="700" letter-spacing="-1.5" fill="#7cffb0" filter="url(#glow-sm)">OS</text>

  <!-- Tagline under wordmark -->
  <text x="119" y="78" font-family="'Geist Mono', monospace" font-size="10" letter-spacing="0.14em" fill="rgba(124,255,176,0.42)">SERVICE MESH FOR AI AGENTS</text>

  <!-- ── MID DIVIDER ── -->
  <line x1="60" y1="104" x2="1140" y2="104" stroke="rgba(124,255,176,0.10)" stroke-width="1"></line>
  <circle cx="60" cy="104" r="2" fill="rgba(124,255,176,0.3)"></circle>
  <circle cx="1140" cy="104" r="2" fill="rgba(124,255,176,0.3)"></circle>

  <!-- ── META ROW ── -->
  <!-- RELEASE pill -->
  <rect x="60" y="116" width="76" height="20" rx="4" fill="rgba(124,255,176,0.08)" stroke="rgba(124,255,176,0.25)" stroke-width="1"></rect>
  <text x="98" y="130" text-anchor="middle" font-family="'Geist Mono', monospace" font-size="9" letter-spacing="0.1em" fill="rgba(124,255,176,0.75)">RELEASE</text>
  <!-- Date -->
  <text x="146" y="130" font-family="'Geist Mono', monospace" font-size="11" fill="rgba(180,188,200,0.55)">Apr 26, 2026</text>
  <circle cx="244" cy="126" r="1.5" fill="rgba(180,188,200,0.25)"></circle>
  <text x="254" y="130" font-family="'Geist Mono', monospace" font-size="11" fill="rgba(180,188,200,0.55)">5 min read</text>

  <!-- ── BLOG TITLE ── -->
  <text x="60" y="170" font-family="'Geist', 'Inter', system-ui, sans-serif" font-size="32" font-weight="600" letter-spacing="-0.03em" fill="#ffffff">Catch infinite loops before they cost you.</text>

</svg>